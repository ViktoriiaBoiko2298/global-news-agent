<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Concept 2 — Minimal Terminal Finance</title>
    <style>
      :root { color-scheme: dark; --bg:#071018; --panel:#101924; --line:rgba(255,255,255,.08); --text:#f5f7ff; --muted:#9ab2b2; --accent:#28d98a; }
      * { box-sizing:border-box; } body { margin:0; font-family:Inter,system-ui,sans-serif; color:var(--text); background:radial-gradient(circle at top right, rgba(40,217,138,.12), transparent 24%), var(--bg); }
      main { width:min(1400px, calc(100% - 24px)); margin:0 auto; padding:18px 0 28px; }
      .top { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:16px; }
      .pill { display:inline-flex; align-items:center; min-height:32px; padding:0 12px; border-radius:999px; background:rgba(40,217,138,.14); color:#bff3db; font-size:12px; font-weight:700; }
      h1 { margin:10px 0 0; font-size:32px; } p { margin:6px 0 0; color:var(--muted); }
      .nav { display:flex; gap:10px; flex-wrap:wrap; }
      .nav a { color:var(--text); text-decoration:none; padding:10px 12px; border-radius:12px; background:rgba(255,255,255,.04); border:1px solid var(--line); }
      img { width:100%; display:block; border-radius:18px; border:1px solid var(--line); background:var(--panel); }
    </style>
  </head>
  <body>
    <main>
      <div class="top">
        <div><span class="pill">Concept 2</span><h1>Minimal Terminal Finance</h1><p>Темный, плотный и market-first.</p></div>

      </div>
      <img src="/mockups/concept-2-minimal-terminal-finance.png" alt="Concept 2" />
    </main>
  </body>
