<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Concept 1 — Editorial Signal Desk</title>
    <style>
      :root { color-scheme: dark; --bg:#0b1020; --panel:#12192f; --line:rgba(255,255,255,.08); --text:#f5f7ff; --muted:#a2accd; --accent:#6d7cff; }
      * { box-sizing:border-box; } body { margin:0; font-family:Inter,system-ui,sans-serif; color:var(--text); background:radial-gradient(circle at top left, rgba(109,124,255,.18), transparent 24%), var(--bg); }
      main { width:min(1400px, calc(100% - 24px)); margin:0 auto; padding:18px 0 28px; }
      .top { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:16px; }
      .pill { display:inline-flex; align-items:center; min-height:32px; padding:0 12px; border-radius:999px; background:rgba(109,124,255,.14); color:#cfd5ff; font-size:12px; font-weight:700; }
      h1 { margin:10px 0 0; font-size:32px; } p { margin:6px 0 0; color:var(--muted); }
      .nav { display:flex; gap:10px; flex-wrap:wrap; }
      .nav a { color:var(--text); text-decoration:none; padding:10px 12px; border-radius:12px; background:rgba(255,255,255,.04); border:1px solid var(--line); }
      img { width:100%; display:block; border-radius:18px; border:1px solid var(--line); background:var(--panel); }
    </style>
  </head>
  <body>
    <main>
      <div class="top">
        <div><span class="pill">Concept 1</span><h1>Editorial Signal Desk</h1><p>Премиальный newsroom-style интерфейс.</p></div>
        <nav class="nav"><a href="/mockups/">Все макеты</a><a href="/mockups/concept-2.html">Следующий</a></nav>
      </div>
      <img src="/mockups/concept-1-editorial-signal-desk.png" alt="Concept 1" />
    </main>
  </body>
</html>
